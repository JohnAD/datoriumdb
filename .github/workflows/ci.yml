name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly Compose E2E run (05:00 UTC), independent of any push.
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      run_compose_e2e:
        description: "Force-run the Compose E2E job on manual dispatch"
        type: boolean
        default: true

permissions:
  contents: read

env:
  GO_VERSION_FILE: go.mod

jobs:
  # --- formatting, vet, dependency verification -----------------------------
  lint:
    name: format / vet / deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go vet (tagged test suites)
        run: go vet -tags "contract integration crash compose" ./...
      - name: go mod verify
        run: go mod verify
      - name: go mod tidy check
        run: go mod tidy -diff

  # --- fast default unit suite, with -race -----------------------------------
  unit:
    name: unit tests (-race)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - name: go test ./... -race
        run: go test ./... -race -count=1

  # --- contract (in-process golden envelopes) + local integration
  # (real subprocess/HTTP) tests, with coverage artifacts --------------------
  contract-and-integration:
    name: contract + integration tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - name: go test -tags contract (with coverage)
        run: |
          go test -tags contract ./... -count=1 \
            -coverpkg=./internal/...,./test/... \
            -coverprofile=coverage-contract.out
      - name: go test -tags integration
        run: go test -tags integration ./test/integration/... -count=1 -v
      - name: coverage gate for core packages
        run: bash scripts/coverage.sh
      - name: upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage-contract.out
            coverage-*.out
            coverage-report.txt
          if-no-files-found: warn
          retention-days: 14

  # --- crash / hard-failure tests, Linux only (SIGKILL + process-group
  # semantics assumed by test/testutil/process.go) ---------------------------
  crash:
    name: crash tests (SIGKILL, Linux)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - name: go test -tags crash
        run: go test -tags crash ./test/crash/... -count=1 -v -timeout 5m
      - name: upload crash test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-test-logs
          path: /tmp/*.log
          if-no-files-found: ignore
          retention-days: 7

  # --- Compose E2E: five-shard + degraded-replication, on main/nightly/manual
  compose-e2e:
    name: compose E2E (five-shard, degraded-replication)
    runs-on: ubuntu-latest
    needs: lint
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - name: docker info
        run: docker info && docker compose version
      - name: go test -tags compose (five-shard, degraded-replication)
        run: |
          go test -tags compose ./test/compose/... -count=1 -v -timeout 20m \
            -run 'TestComposeFiveShard|TestComposeDegradedReplication'
      - name: dump compose logs and data trees on failure
        if: failure()
        run: |
          # test/compose leaves failed projects running (named
          # "datoriumdb-<topology>-<timestamp>") specifically so this step
          # can collect container logs and a snapshot of each /db volume
          # before the runner is torn down.
          set +e
          mkdir -p /tmp/compose-failure-artifacts/data-trees
          docker ps -a > /tmp/compose-failure-artifacts/docker-ps.txt 2>&1
          for cid in $(docker ps -aq --filter "name=datoriumdb-"); do
            cname=$(docker inspect -f '{{.Name}}' "$cid" | tr -d /)
            docker logs "$cid" > "/tmp/compose-failure-artifacts/${cname}.log" 2>&1
          done
          for vol in $(docker volume ls -q --filter "name=datoriumdb-"); do
            docker run --rm -v "${vol}:/from:ro" -v /tmp/compose-failure-artifacts/data-trees:/to alpine \
              sh -c "cp -a /from '/to/${vol}'" 2>&1
          done
          # Now safe to tear everything down.
          docker ps -aq --filter "name=datoriumdb-" | xargs -r docker rm -f
          docker volume ls -q --filter "name=datoriumdb-" | xargs -r docker volume rm
          set -e
      - name: upload compose failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-e2e-failure-artifacts
          path: /tmp/compose-failure-artifacts
          if-no-files-found: ignore
          retention-days: 7

  # --- Dockerfile build sanity: build (not push) the runtime image ----------
  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: docker build
        run: docker build -t datoriumdb:ci .
