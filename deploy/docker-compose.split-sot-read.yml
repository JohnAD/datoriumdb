# Split SOT/read DatoriumDB topology: serverA is the establishment
# server and the whole keyspace's SHARD_SOT_MEMBER; serverB is a
# dedicated SHARD_READ_MEMBER that never accepts writes
# (tech-docs/SHARDING.md's "The read-members can be different from the
# SOT-member").
#
# Quick start (from the repository root):
#   docker compose -f deploy/docker-compose.split-sot-read.yml up --build
#   curl http://127.0.0.1:8080/datoriumdb/v1/health   # serverA (SOT)
#   curl http://127.0.0.1:8081/datoriumdb/v1/health   # serverB (read)
#
# Config source: test/compose/fixtures/split-sot-read/serverA/.config

services:
  serverA:
    build:
      context: ..
      dockerfile: Dockerfile
    image: datoriumdb:local
    command: ["serverA", "http://serverA:8080", "--listen", "0.0.0.0:8080"]
    environment:
      DATORIUMDB_MACHINE_BOOTSTRAP_SECRET_FILE: /run/secrets/bootstrap_secret
      DATORIUMDB_SIGNING_KEY_FILE: /run/secrets/signing_key
    secrets:
      - bootstrap_secret
      - signing_key
    volumes:
      - serverA_data:/db
      - ../test/compose/fixtures/split-sot-read/serverA/.config:/db/.config
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/datoriumdb/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  serverB:
    build:
      context: ..
      dockerfile: Dockerfile
    image: datoriumdb:local
    command: ["serverB", "http://serverA:8080", "--listen", "0.0.0.0:8080"]
    environment:
      DATORIUMDB_MACHINE_BOOTSTRAP_SECRET_FILE: /run/secrets/bootstrap_secret
    secrets:
      - bootstrap_secret
    volumes:
      - serverB_data:/db
    ports:
      - "8081:8080"
    depends_on:
      serverA:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/datoriumdb/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

secrets:
  bootstrap_secret:
    file: ./secrets/bootstrap-secret.txt
  signing_key:
    file: ../testdata/sample-config/dev-signing-key.pem

volumes:
  serverA_data:
  serverB_data:
